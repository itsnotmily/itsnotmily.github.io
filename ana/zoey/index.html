<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question Game</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container text-center mt-5">

<h2 id="question"></h2>

<div class="mt-3">
<button class="btn btn-success m-2" onclick="answer(true)">Yes</button>
<button class="btn btn-danger m-2" onclick="answer(false)">No</button>
</div>

<p class="mt-4" id="message"></p>

<button id="continueBtn" class="btn btn-primary mt-3" onclick="nextQuestion()" style="display:none;">
Continue
</button>

</div>

<script>

let questions = [
{
text: "Is Mily cool?",
correct: true,
info: "Correct. Mily has been officially confirmed to be cool."
},
{
text: "Is Mily awesome?",
correct: true,
info: "Correct again. Scientific studies say Mily is awesome."
},
{
text: "Is Mily the best?",
correct: true,
info: "Final fact: Mily is indeed the best."
}
];

let current = 0;

function showQuestion() {
document.getElementById("question").innerText = questions[current].text;
document.getElementById("message").innerText = "";
document.getElementById("continueBtn").style.display = "none";
}

function answer(choice) {

if (choice === questions[current].correct) {
document.getElementById("message").innerText = questions[current].info;
document.getElementById("continueBtn").style.display = "inline-block";
} else {
document.getElementById("message").innerText = "Wrong. Try again.";
}

}

function nextQuestion() {
current++;

if (current < questions.length) {
showQuestion();
} else {
document.getElementById("question").innerText = "You finished!";
document.getElementById("message").innerText = "";
document.getElementById("continueBtn").style.display = "none";
}
}

showQuestion();

</script>

</body>
</html>
