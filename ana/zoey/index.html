<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Question Game</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>
#noBtn{
position:absolute;
}
</style>

</head>

<body class="bg-light">

<div class="container text-center mt-5">

<h2 id="question"></h2>

<div class="mt-4">
<button class="btn btn-success m-2" onclick="answer(true)">Yes</button>
<button id="noBtn" class="btn btn-danger m-2">No</button>
</div>

<p class="mt-4" id="message"></p>

<button id="continueBtn" class="btn btn-primary mt-3" onclick="nextQuestion()" style="display:none;">
Continue
</button>

</div>

<script>

let questions = [
{
text: "Is Mily cool?",
correct: true,
info: "Correct. Mily is cool."
},
{
text: "Is Mily awesome?",
correct: true,
info: "Correct again."
},
{
text: "Is Mily the best?",
correct: true,
info: "Obviously yes."
}
];

let current = 0;

function showQuestion(){
document.getElementById("question").innerText = questions[current].text;
document.getElementById("message").innerText = "";
document.getElementById("continueBtn").style.display = "none";
}

function answer(choice){

if(choice === questions[current].correct){
document.getElementById("message").innerText = questions[current].info;
document.getElementById("continueBtn").style.display = "inline-block";
}else{
document.getElementById("message").innerText = "Wrong. Try again.";
}

}

function nextQuestion(){
current++;

if(current < questions.length){
showQuestion();
}else{
document.getElementById("question").innerText = "You finished!";
document.getElementById("message").innerText = "";
document.getElementById("continueBtn").style.display = "none";
}
}

showQuestion();

/* RUNAWAY BUTTON */

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {

let x = Math.random() * (window.innerWidth - 100);
let y = Math.random() * (window.innerHeight - 50);

noBtn.style.left = x + "px";
noBtn.style.top = y + "px";

});

</script>

</body>
</html>
