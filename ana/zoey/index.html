<!-- Quiz Section -->
<div class="container">
  <div class="card text-white text-center bg-dark mb-3 position-relative" style="min-height:220px;">
    <div class="card-header text-dark bg-warning">
      <h3>Zoey Quiz</h3>
    </div>
    <div class="card-body" id="quizBody">

      <h2 id="question">Loading...</h2>

      <div class="mt-3">
        <button class="btn btn-success btn-lg m-2" id="yesBtn">Yes</button>
        <button class="btn btn-danger btn-lg m-2 position-absolute" id="noBtn">No</button>
      </div>

      <p class="mt-4" id="message"></p>

      <button id="continueBtn" class="btn btn-primary mt-3" style="display:none;">Continue</button>

    </div>
  </div>
</div>

<br>

<!-- Bootstrap Bundle with Popper.js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Quiz JavaScript -->
<script>
document.addEventListener("DOMContentLoaded", function(){

  const questions = [
    { text: "Is Zoey the coolest person?", correct: true, info: "Correct. Zoey is the coolest person, she makes everything so much more fun just by being there." },
    { text: "Is Zoey awesome?", correct: true, info: "Correct again." },
    { text: "Is Zoey the best?", correct: true, info: "Obviously yes." }
  ];

  let current = 0;

  const questionEl = document.getElementById("question");
  const messageEl = document.getElementById("message");
  const continueBtn = document.getElementById("continueBtn");
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");
  const quizBody = document.getElementById("quizBody");

  // store the default No button position
  const defaultNoTop = noBtn.offsetTop;
  const defaultNoLeft = noBtn.offsetLeft;

  function showQuestion() {
    questionEl.innerText = questions[current].text;
    messageEl.innerText = "";
    continueBtn.style.display = "none";
    // reset No button to default position
    noBtn.style.top = defaultNoTop + "px";
    noBtn.style.left = defaultNoLeft + "px";
  }

  function answer(choice){
    if(choice === questions[current].correct){
      messageEl.innerText = questions[current].info;
      continueBtn.style.display = "inline-block";
    } else {
      messageEl.innerText = "Wrong. Try again.";
    }
  }

  function nextQuestion(){
    current++;
    if(current < questions.length){
      showQuestion();
    } else {
      questionEl.innerText = "You finished!";
      messageEl.innerText = "";
      continueBtn.style.display = "none";
    }
  }

  yesBtn.addEventListener("click", () => answer(true));
  continueBtn.addEventListener("click", nextQuestion);

  // runaway No button inside quiz card
  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (rect.width - noBtn.offsetWidth);
    const y = Math.random() * (rect.height - noBtn.offsetHeight);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  showQuestion();

});
</script>
