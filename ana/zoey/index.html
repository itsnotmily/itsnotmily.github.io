<!-- Quiz Section -->
<div class="container">
  <div class="card text-white text-center bg-dark mb-3 position-relative" style="min-height:220px;">
    <div class="card-header text-dark bg-warning">
      <h3>Zoey Quiz</h3>
    </div>
    <div class="card-body" id="quizBody">

      <h2 id="question">Loading...</h2>

      <div class="mt-3">
        <button class="btn btn-success btn-lg m-2" id="yesBtn">Yes</button>
        <button class="btn btn-danger btn-lg m-2 position-absolute" id="noBtn">No</button>
      </div>

      <p class="mt-4" id="message"></p>

      <button id="continueBtn" class="btn btn-primary mt-3" style="display:none;">Continue</button>

    </div>
  </div>
</div>

<br>

<!-- Bootstrap Bundle with Popper.js -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Quiz JavaScript -->
<script>
document.addEventListener("DOMContentLoaded", function(){

  const questions = [
    { text: "Is Zoey the coolest person?", correct: true, info: "Correct. Zoey is the coolest person, she makes everything so much more fun just by being there."},
    { text: "Does Zoey show inspiration?", correct: true, info: "Zoey shows me a lot of inspiration, on how to stay strong, advises me to speak up and teaches me to communicate." },
    { text: "Is Zoey always there for her friends?", correct: true, info: "Zoey always puts everyone else before her, even if this can be a bad thing at times, it's still something to be proud of and she does it without hesitation." },
    { text: "Is Zoey creative?", correct: true, info: "Zoey has so many creative moments, when she makes jokes out of nothing, when she sings her songs, when she improves TV shows and movies by predicting or adding her own twist." },
    { text: "Can Zoey sing?", correct: true, info: "The cutest songs, her own and covers and just snippets are always a pleasure to listen to." },
    { text: "So her voice must be great?", correct: true, info: "Yes! Hearing her voice is always a joy, and something I miss always. Even when it needs activating, even when it's slightly poorly, it's still super cute!" },
    { text: "Is Zoey good company?", correct: true, info: "It's so great that staying away is difficult. She brings calmness when things get tough and even silence is comforting." },
    { text: "Is Zoey reliable?", correct: true, info: "One thing I can guarantee is that Zoey is always there when I need her." },
    { text: "Can Zoey make ordinary moments special?", correct: true, info: "There are no ordinary moments with Zoey!" },
    { text: "Does Zoey make a great teammate?", correct: true, info: "Zoey always supports her teammates, she will heal until the end, fierce with no fear." },
    { text: "Is Zoey someone who makes others feel appreciated?", correct: true, info: "She brings the best out in people, and simply being herself makes everyone feel valued." },
    { text: "Could Zoey be a good leader?", correct: true, info: "Zoey makes plans, includes people and thinks of every outcome, even overthinking can be positive when used correctly." },
    { text: "Is Zoey a great friend?", correct: true, info: "Correct again. Zoey is a wonderful bestie. She makes me realise how true friends should be." },
    { text: "Is Zoey the best?", correct: true, info: "The bestest 💙" }
  ];

  let current = 0;

  const questionEl = document.getElementById("question");
  const messageEl = document.getElementById("message");
  const continueBtn = document.getElementById("continueBtn");
  const yesBtn = document.getElementById("yesBtn");
  const noBtn = document.getElementById("noBtn");

  const defaultNoTop = noBtn.offsetTop;
  const defaultNoLeft = noBtn.offsetLeft;

  function showQuestion() {
    questionEl.innerText = questions[current].text;
    messageEl.innerText = "";
    continueBtn.style.display = "none";
    // reset No button to default position

  }

  function answer(choice){
    if(choice === questions[current].correct){
      messageEl.innerText = questions[current].info;
      continueBtn.style.display = "inline-block";
    } else {
      messageEl.innerText = "Wrong. Try again.";
    }
  }

function nextQuestion(){
  current++;
  if(current < questions.length){
    showQuestion();
  } else {
    questionEl.innerText = "Now you know how amazing Zoey is!";
    messageEl.innerText = "";
    // hide all buttons
    yesBtn.style.display = "none";
    noBtn.style.display = "none";
    continueBtn.style.display = "none";
  }
}

  yesBtn.addEventListener("click", () => answer(true));
  continueBtn.addEventListener("click", nextQuestion);

  // runaway No button inside quiz card
  noBtn.addEventListener("mouseover", () => {
    const rect = quizBody.getBoundingClientRect();
    const x = Math.random() * (rect.width - noBtn.offsetWidth);
    const y = Math.random() * (rect.height - noBtn.offsetHeight);
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
  });

  showQuestion();

});
</script>
